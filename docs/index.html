<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelForge — Script Moderation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --green:     #22c55e;
      --green-dim: #166534;
      --amber:     #f59e0b;
      --amber-dim: #78350f;
      --red:       #ef4444;
      --red-dim:   #7f1d1d;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .counter {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .tone-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tone-bar label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tone-bar select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .tone-bar select:focus { outline: 2px solid #6366f1; }

    /* ── Main content ── */
    main {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Campaign card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: opacity 0.3s, transform 0.3s;
    }

    .card.removing {
      opacity: 0;
      transform: scale(0.97);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .card-header h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .book-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .spice { color: #fb923c; }

    .campaign-type {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      white-space: nowrap;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ── Book summary ── */
    .book-summary {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .book-summary summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      user-select: none;
    }

    .book-summary p {
      margin-top: 8px;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── Script parts ── */
    .parts {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .part {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .part-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .part-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .hook-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      color: white;
      letter-spacing: 0.3px;
    }

    /* ── Fields ── */
    .card-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .hint-inline {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11px;
    }

    .field {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      padding: 8px 10px;
      resize: vertical;
      width: 100%;
      transition: border-color 0.15s;
    }

    .field:focus {
      outline: none;
      border-color: #6366f1;
    }

    input.field { resize: none; }

    /* ── Tone override section ── */
    .tone-override {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(99, 102, 241, 0.04);
    }

    .tone-override label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #818cf8;
      margin-bottom: 6px;
    }

    /* ── Action buttons ── */
    .card-actions {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
    }

    button {
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 20px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-approve    { background: var(--green);     color: #fff; }
    .btn-regenerate { background: var(--amber);     color: #000; }
    .btn-reject     { background: transparent; border: 1px solid var(--red); color: var(--red); }

    /* ── States ── */
    .loading, .empty, .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty p:first-child { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .error { color: var(--red); }
    .hint { font-size: 13px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      transition: background 0.15s, color 0.15s;
    }

    .tab.active {
      background: #6366f1;
      border-color: #6366f1;
      color: white;
    }

    /* ── Video compose card ── */
    .compose-section {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .compose-section h3 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .bg-status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .bg-status.has-upload { border-color: var(--green); color: var(--green); }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-upload   { background: #6366f1; color: white; }
    .btn-compose  { background: var(--green); color: white; }
    .btn-schedule { background: transparent; border: 1px solid var(--border); color: var(--muted); }

    .schedule-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .schedule-row label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .schedule-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .upload-progress {
      font-size: 13px;
      color: var(--muted);
    }

    .audio-parts {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .audio-part-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .audio-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    /* ── Delivery tab ── */
    .delivery-section {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .delivery-section h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .download-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-download {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-download:hover { background: #1e40af; }
    .btn-download:disabled { opacity: 0.5; cursor: default; }

    .caption-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .btn-copy {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }

    .btn-copy:hover { background: var(--border); }

    .btn-publish {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green-dim);
      border-radius: 6px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-publish:hover { background: #14532d; }
    .btn-publish:disabled { opacity: 0.5; cursor: default; }

    /* ── Publisher Licenses tab ── */
    .pub-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 4px;
    }

    .pub-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pub-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      min-width: 90px;
      text-align: center;
    }

    .pub-stat-num {
      display: block;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .pub-stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pub-stat-green .pub-stat-num { color: var(--green); }
    .pub-stat-blue  .pub-stat-num { color: #60a5fa; }
    .pub-stat-amber .pub-stat-num { color: var(--amber); }

    .pub-header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .btn-add-pub {
      background: #6366f1;
      color: white;
      padding: 8px 16px;
      font-size: 13px;
    }

    .btn-focus-mode {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 13px;
    }

    .btn-focus-mode.is-active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .pub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .pub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pub-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .pub-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .pub-domain {
      font-size: 12px;
      color: var(--muted);
    }

    .pub-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }

    .badge-green { background: var(--green-dim);  color: var(--green); }
    .badge-blue  { background: #1e3a5f;            color: #60a5fa; }
    .badge-amber { background: var(--amber-dim);   color: var(--amber); }
    .badge-red   { background: var(--red-dim);     color: var(--red); }
    .badge-muted { background: var(--surface2);    color: var(--muted); border: 1px solid var(--border); }

    .pub-checklist {
      display: flex;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .pub-check-item {
      font-size: 12px;
      color: var(--muted);
    }

    .pub-check-item.done { color: var(--green); }

    .pub-contact {
      padding: 8px 18px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .pub-contact-name { color: var(--text); }

    a.pub-contact-email {
      color: #60a5fa;
      text-decoration: none;
    }

    a.pub-contact-email:hover { text-decoration: underline; }

    .pub-inline-form {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pub-inline-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .pub-dates {
      padding: 8px 18px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .pub-date {
      font-size: 12px;
      color: var(--muted);
    }

    .pub-date-warn { color: var(--amber); }

    .pub-portal {
      padding: 8px 18px;
      border-bottom: 1px solid var(--border);
    }

    a.pub-portal-link {
      font-size: 13px;
      color: #60a5fa;
      text-decoration: none;
    }

    a.pub-portal-link:hover { text-decoration: underline; }

    .pub-actions {
      padding: 12px 18px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .btn-pub-action {
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 7px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .btn-pub-green { background: var(--green-dim); color: var(--green); }
    .btn-pub-amber { background: var(--amber-dim); color: var(--amber); }
    .btn-pub-red   { background: var(--red-dim);   color: var(--red); }
    .btn-pub-muted { background: var(--surface2);  color: var(--muted); border: 1px solid var(--border); }
    .btn-pub-indigo { background: #6366f1; color: white; }

    .pub-action-done {
      font-size: 13px;
      color: var(--green);
      font-weight: 600;
      padding: 7px 0;
    }

    .pub-action-status {
      padding: 0 18px 10px;
      font-size: 12px;
      color: var(--red);
      min-height: 4px;
    }

    .btn-save-contact {
      background: #6366f1;
      color: white;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
    }

    .btn-cancel-inline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
    }

    /* Focus mode */
    .pub-focus-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-top: 4px;
    }

    .pub-focus-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-focus-nav {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 7px;
    }

    .pub-focus-counter {
      font-size: 13px;
      color: var(--muted);
      min-width: 50px;
      text-align: center;
    }

    .pub-focus-card {
      width: 100%;
      max-width: 540px;
    }

    /* Add Publisher modal */
    .pub-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .pub-modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .pub-modal-box h3 {
      font-size: 17px;
      font-weight: 700;
    }

    .pub-modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>ReelForge</h1>
    <span id="counter" class="counter">Loading…</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('review')">Script Review</button>
    <button class="tab"        onclick="switchTab('compose')">Video Compose</button>
    <button class="tab"        onclick="switchTab('delivery')">Delivery</button>
    <button class="tab"        onclick="switchTab('publishers')">Publishers</button>
  </div>
  <div id="tone-controls" class="tone-bar" style="margin-top:14px;">
    <label>Default tone for regeneration:</label>
    <select id="global-tone">
      <option value="">— not set —</option>
      <option value="cozy">Cozy &amp; heartwarming</option>
      <option value="dramatic">Dramatic &amp; emotional</option>
      <option value="hype">Hype &amp; energetic</option>
      <option value="mysterious">Mysterious &amp; intriguing</option>
      <option value="funny">Witty &amp; funny</option>
      <option value="romantic">Swoony &amp; romantic</option>
    </select>
    <select id="global-style">
      <option value="">— not set —</option>
      <option value="storytelling">Storytelling</option>
      <option value="hook-heavy">Hook-heavy</option>
      <option value="pov">POV:</option>
      <option value="comparison">Comparison (X meets Y)</option>
      <option value="list">List (reasons to read)</option>
    </select>
  </div>
</header>

<main id="campaigns"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL    = 'https://mcnlgvknjgixrjqpixse.supabase.co';

  // ── Fill these in after deploying the two new Cloud Functions ──────────────
  const COMPOSER_URL = 'https://video-composer-kfxuvvfhqa-uc.a.run.app';
  const PRESIGN_URL  = 'https://r2-presign-kfxuvvfhqa-uc.a.run.app';
  // ──────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;

  // Key is never stored in code — prompted once and saved to localStorage
  function getKey() {
    let key = localStorage.getItem('rf-anon-key');
    if (!key) {
      key = prompt('Enter your Supabase anon key (legacy eyJ... format).\nThis will be saved in your browser only.');
      if (!key) return null;
      localStorage.setItem('rf-anon-key', key.trim());
    }
    return key;
  }

  const anonKey = getKey();
  if (!anonKey) {
    document.getElementById('campaigns').innerHTML = '<p class="error">No API key provided. Refresh to try again.</p>';
    throw new Error('No API key');
  }

  const db = createClient(SUPABASE_URL, anonKey);

  
  const SPICE_LABELS = ['clean', 'mild', 'low', 'medium', 'spicy', 'very spicy'];
  const HOOK_COLORS  = {
    CURIOSITY_GAP:   '#6366f1',
    IDENTITY_SIGNAL: '#0891b2',
    SOCIAL_PROOF:    '#059669',
    LOSS_AVERSION:   '#d97706',
    CONTRADICTION:   '#dc2626',
  };

  // Persist global tone/style across page reloads
  const toneEl  = document.getElementById('global-tone');
  const styleEl = document.getElementById('global-style');
  toneEl.value  = localStorage.getItem('rf-tone')  || '';
  styleEl.value = localStorage.getItem('rf-style') || '';
  toneEl.addEventListener('change',  () => localStorage.setItem('rf-tone',  toneEl.value));
  styleEl.addEventListener('change', () => localStorage.setItem('rf-style', styleEl.value));

  // ── Tab switching ─────────────────────────────────────────────────────────
  let activeTab = 'review';

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    const toneControls = document.getElementById('tone-controls');
    toneControls.style.display = tab === 'review' ? '' : 'none';
    if (tab === 'review')           loadCampaigns();
    else if (tab === 'compose')     loadVoicedCampaigns();
    else if (tab === 'delivery')    loadComposedCampaigns();
    else if (tab === 'publishers')  loadPublishers();
  }

  // ── Load ─────────────────────────────────────────────────────────────────
  async function loadCampaigns() {
    const container = document.getElementById('campaigns');
    container.innerHTML = '<p class="loading">Loading campaigns…</p>';

    const { data, error } = await db
      .from('campaigns')
      .select(`
        id, campaign_type, caption, hashtags, tone_note,
        books ( title, author, genre, spice_level, description ),
        campaign_parts ( part_number, total_parts, hook, body, cta, hook_category )
      `)
      .eq('status', 'SCRIPTED')
      .order('created_at', { ascending: true });

    if (error) {
      container.innerHTML = `<p class="error">Failed to load: ${error.message}</p>`;
      return;
    }

    updateCounter(data.length);

    if (data.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <p>Nothing to review</p>
          <p class="hint">Check back after Monday's pipeline run.</p>
        </div>`;
      return;
    }

    container.innerHTML = data.map(c => renderCard(c)).join('');
  }

  function updateCounter(n) {
    const el = document.getElementById('counter');
    el.textContent = n === 0 ? 'All done' : `${n} awaiting review`;
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function renderCard(c) {
    const book  = c.books;
    if (!book) return '';
    const parts = (c.campaign_parts || []).sort((a, b) => a.part_number - b.part_number);
    const tags  = (c.hashtags || []).join(', ');
    const spice = SPICE_LABELS[book.spice_level] || book.spice_level;

    const partsHtml = parts.map(p => `
      <div class="part" data-part="${p.part_number}">
        <div class="part-header">
          <span class="part-label">Part ${p.part_number} of ${p.total_parts}</span>
          <span class="hook-badge" style="background:${HOOK_COLORS[p.hook_category] || '#6b7280'}">
            ${p.hook_category}
          </span>
        </div>
        <div class="field-group">
          <label>Hook</label>
          <textarea class="field hook-field" rows="2">${esc(p.hook)}</textarea>
        </div>
        <div class="field-group">
          <label>Body</label>
          <textarea class="field body-field" rows="4">${esc(p.body)}</textarea>
        </div>
        <div class="field-group">
          <label>CTA</label>
          <textarea class="field cta-field" rows="1">${esc(p.cta)}</textarea>
        </div>
      </div>
    `).join('');

    return `
      <div class="card" data-id="${c.id}">
        <div class="card-header">
          <div class="book-info">
            <h2>${esc(book.title)}</h2>
            <p class="book-meta">
              ${esc(book.author)} · ${esc(book.genre)} ·
              <span class="spice">spice: ${spice}</span>
            </p>
          </div>
          <span class="campaign-type">${c.campaign_type}</span>
        </div>

        ${book.description ? `
        <details class="book-summary">
          <summary>About this book</summary>
          <p>${esc(book.description)}</p>
        </details>` : ''}

        <div class="parts">${partsHtml}</div>

        <div class="card-body">
          <div class="field-group">
            <label>Caption</label>
            <textarea class="field caption-field" rows="6">${esc(c.caption || '')}</textarea>
          </div>
          <div class="field-group">
            <label>Hashtags <span class="hint-inline">(comma-separated, no #)</span></label>
            <input class="field hashtag-field" type="text" value="${esc(tags)}">
          </div>
        </div>

        <div class="tone-override">
          <label>Tone note for regeneration (optional)</label>
          <input class="field tone-note-field" type="text"
            placeholder="e.g. more dramatic, lean into the rivalry, make the hook punchier"
            value="${esc(c.tone_note || '')}">
        </div>

        <div class="card-actions">
          <button class="btn-approve"    onclick="approve('${c.id}')">✓ Approve</button>
          <button class="btn-regenerate" onclick="regenerate('${c.id}')">↺ Regenerate</button>
          <button class="btn-reject"     onclick="reject('${c.id}')">✕ Reject</button>
        </div>
      </div>
    `;
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getCard(id) {
    return document.querySelector(`.card[data-id="${id}"]`);
  }

  function getEdits(id) {
    const card = getCard(id);
    const parts = [];
    card.querySelectorAll('.part').forEach(p => {
      parts.push({
        part_number: parseInt(p.dataset.part),
        hook:        p.querySelector('.hook-field').value,
        body:        p.querySelector('.body-field').value,
        cta:         p.querySelector('.cta-field').value,
      });
    });
    const caption   = card.querySelector('.caption-field').value;
    const tagsRaw   = card.querySelector('.hashtag-field').value;
    const hashtags  = tagsRaw.split(',').map(h => h.trim().replace(/^#/, '')).filter(Boolean);
    const toneNote  = card.querySelector('.tone-note-field').value.trim();
    return { parts, caption, hashtags, toneNote };
  }

  function setButtons(id, disabled, approveText) {
    const card = getCard(id);
    card.querySelectorAll('button').forEach(b => b.disabled = disabled);
    if (approveText) card.querySelector('.btn-approve').textContent = approveText;
  }

  async function saveEdits(id) {
    const { parts, caption, hashtags } = getEdits(id);
    const now = new Date().toISOString();

    for (const part of parts) {
      const { error } = await db.from('campaign_parts')
        .update({ hook: part.hook, hook_text: part.hook, body: part.body, cta: part.cta })
        .eq('campaign_id', id)
        .eq('part_number', part.part_number);
      if (error) throw new Error(`Part ${part.part_number}: ${error.message}`);
    }

    const { error } = await db.from('campaigns')
      .update({ caption, hashtags, updated_at: now })
      .eq('id', id);
    if (error) throw new Error(`Caption/hashtags: ${error.message}`);
  }

  function removeCard(id) {
    const card = getCard(id);
    card.classList.add('removing');
    setTimeout(() => {
      card.remove();
      const remaining = document.querySelectorAll('.card').length;
      updateCounter(remaining);
      if (remaining === 0) {
        document.getElementById('campaigns').innerHTML = `
          <div class="empty">
            <p>All done!</p>
            <p class="hint">Check back after Monday's pipeline run.</p>
          </div>`;
      }
    }, 300);
  }

  // ── Actions ──────────────────────────────────────────────────────────────
  async function approve(id) {
    setButtons(id, true, 'Saving…');
    try {
      await saveEdits(id);
      const { error } = await db.from('campaigns')
        .update({ status: 'MODERATION_SCRIPT', updated_at: new Date().toISOString() })
        .eq('id', id);
      if (error) throw new Error(error.message);
      removeCard(id);
    } catch (e) {
      alert(`Approve failed: ${e.message}`);
      setButtons(id, false);
      getCard(id).querySelector('.btn-approve').textContent = '✓ Approve';
    }
  }

  async function regenerate(id) {
    const { toneNote } = getEdits(id);

    // Build tone note: per-card note wins; fall back to global selectors
    let note = toneNote;
    if (!note) {
      const parts = [];
      const tv = toneEl.value;
      const sv = styleEl.value;
      if (tv) parts.push(`tone: ${toneEl.options[toneEl.selectedIndex].text}`);
      if (sv) parts.push(`style: ${styleEl.options[styleEl.selectedIndex].text}`);
      note = parts.join(', ');
    }

    setButtons(id, true);
    getCard(id).querySelector('.btn-regenerate').textContent = 'Sending back…';
    try {
      const { error } = await db.from('campaigns')
        .update({
          status:      'CAMPAIGN_DRAFT',
          tone_note:   note || null,
          retry_count: 0,
          last_error:  null,
          updated_at:  new Date().toISOString(),
        })
        .eq('id', id);
      if (error) throw new Error(error.message);
      removeCard(id);
    } catch (e) {
      alert(`Regenerate failed: ${e.message}`);
      setButtons(id, false);
      getCard(id).querySelector('.btn-regenerate').textContent = '↺ Regenerate';
    }
  }

  async function reject(id) {
    if (!confirm('Reject this script? It goes back to CAMPAIGN_DRAFT for re-scripting with no tone note.')) return;
    setButtons(id, true);
    try {
      const { error } = await db.from('campaigns')
        .update({
          status:      'CAMPAIGN_DRAFT',
          tone_note:   null,
          retry_count: 0,
          last_error:  null,
          updated_at:  new Date().toISOString(),
        })
        .eq('id', id);
      if (error) throw new Error(error.message);
      removeCard(id);
    } catch (e) {
      alert(`Reject failed: ${e.message}`);
      setButtons(id, false);
    }
  }

  async function handleUpload(campaignId, input) {
    const file = input.files[0];
    if (!file) return;

    if (!PRESIGN_URL) {
      alert('PRESIGN_URL is not configured. Add it to the script constants after deploying r2-presign.');
      return;
    }

    const progressEl = document.getElementById(`upload-progress-${campaignId}`);
    const bgStatusEl = document.getElementById(`bg-status-${campaignId}`);
    progressEl.textContent = 'Getting upload URL…';

    try {
      // Step 1: get presigned URL
      const presignRes = await fetch(PRESIGN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ campaign_id: campaignId, filename: file.name }),
      });
      if (!presignRes.ok) throw new Error(`Presign failed: ${presignRes.status}`);
      const { presigned_url, public_url } = await presignRes.json();

      // Step 2: upload directly to R2
      progressEl.textContent = 'Uploading…';
      const uploadRes = await fetch(presigned_url, {
        method: 'PUT',
        headers: { 'Content-Type': 'video/mp4' },
        body: file,
      });
      if (!uploadRes.ok) throw new Error(`R2 upload failed: ${uploadRes.status}`);

      // Step 3: update all parts for this campaign in Supabase
      progressEl.textContent = 'Saving…';
      const { error } = await db
        .from('campaign_parts')
        .update({ custom_video_url: public_url, background_type: 'user_uploaded' })
        .eq('campaign_id', campaignId);
      if (error) throw new Error(`DB update failed: ${error.message}`);

      progressEl.textContent = '';
      bgStatusEl.textContent  = '✓ Custom video uploaded';
      bgStatusEl.classList.add('has-upload');
    } catch (e) {
      progressEl.textContent = `Upload failed: ${e.message}`;
    }
  }

  async function composeNow(campaignId) {
    if (!COMPOSER_URL) {
      alert('COMPOSER_URL is not configured. Add it to the script constants after deploying video-composer.');
      return;
    }

    const btn      = document.getElementById(`compose-btn-${campaignId}`);
    const statusEl = document.getElementById(`compose-status-${campaignId}`);
    btn.disabled   = true;
    statusEl.textContent = 'Composing… this takes about 2 minutes per part.';

    try {
      const res = await fetch(COMPOSER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ campaign_id: campaignId }),
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text);

      statusEl.textContent = text;
      // Remove card after a short delay — campaign is now COMPOSED
      setTimeout(() => {
        const card = getCard(campaignId);
        if (card) {
          card.classList.add('removing');
          setTimeout(() => {
            card.remove();
            const remaining = document.querySelectorAll('.card').length;
            updateCounter(remaining);
          }, 300);
        }
      }, 2000);
    } catch (e) {
      statusEl.textContent = `Compose failed: ${e.message}`;
      btn.disabled = false;
    }
  }

  async function downloadPart(url, filename, campaignId, partNum) {
    const btn = document.getElementById(`dl-btn-${campaignId}-${partNum}`);
    btn.disabled = true;
    btn.textContent = 'Downloading…';
    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
      btn.textContent = '✓ Downloaded';
    } catch (e) {
      btn.disabled = false;
      btn.textContent = `⬇ Download Part ${partNum}`;
      alert(`Download failed: ${e.message}`);
    }
  }

  function copyCaption(campaignId) {
    const text = document.getElementById(`caption-${campaignId}`).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = 'Copy caption'; }, 2000);
    });

  }

  function renderPublishers() {
    const container = document.getElementById('campaigns');
    if (pubFocusMode) renderFocusMode(container);
    else              renderDashboard(container);

  // Sort: IN_DISCUSSION first, then OUTREACH_PENDING, LICENSED, EXPIRED, DECLINED
  const PUB_STATUS_ORDER = { IN_DISCUSSION: 0, OUTREACH_PENDING: 1, LICENSED: 2, EXPIRED: 3, DECLINED: 4 };

  function sortedPubs() {
    return [...pubRecords].sort((a, b) => {
      const so = (PUB_STATUS_ORDER[a.status] ?? 5) - (PUB_STATUS_ORDER[b.status] ?? 5);
      return so !== 0 ? so : a.publisher_name.localeCompare(b.publisher_name);
    });
  }

  function renderDashboard(container) {
    const sorted      = sortedPubs();
    const total       = sorted.length;
    const licensed    = sorted.filter(p => p.status === 'LICENSED').length;
    const discussing  = sorted.filter(p => p.status === 'IN_DISCUSSION').length;
    const pending     = sorted.filter(p => p.status === 'OUTREACH_PENDING').length;

    const focusBtnClass = pubFocusMode ? 'btn-focus-mode is-active' : 'btn-focus-mode';

    container.innerHTML = `
      <div class="pub-header">
        <div class="pub-stats">
          <div class="pub-stat">
            <span class="pub-stat-num">${total}</span>
            <span class="pub-stat-label">Total</span>
          </div>
          <div class="pub-stat pub-stat-green">
            <span class="pub-stat-num">${licensed}</span>
            <span class="pub-stat-label">Licensed</span>
          </div>
          <div class="pub-stat pub-stat-blue">
            <span class="pub-stat-num">${discussing}</span>
            <span class="pub-stat-label">In Discussion</span>
          </div>
          <div class="pub-stat pub-stat-amber">
            <span class="pub-stat-num">${pending}</span>
            <span class="pub-stat-label">Pending Outreach</span>
          </div>
        </div>
        <div class="pub-header-actions">
          <button class="${focusBtnClass}" onclick="togglePubFocus()">Focus Mode</button>
          <button class="btn-add-pub" onclick="openAddPublisher()">+ Add Publisher</button>
        </div>
      </div>
      <div class="pub-grid">
        ${sorted.length === 0
          ? `<div style="grid-column:1/-1"><p class="empty"><strong>No publishers yet.</strong><br><span class="hint">Click + Add Publisher to start tracking outreach.</span></p></div>`
          : sorted.map(p => pubCardHtml(p)).join('')}
      </div>
      ${addPublisherModalHtml()}
    `;
  }

  function renderFocusMode(container) {
    const sorted = sortedPubs();
    const focusBtnClass = 'btn-focus-mode is-active';

    if (sorted.length === 0) {
      container.innerHTML = `
        <div class="pub-focus-wrap">
          <div class="pub-focus-nav">
            <button class="${focusBtnClass}" onclick="togglePubFocus()">Exit Focus Mode</button>
          </div>
          <p class="empty">No publishers to focus on.</p>
        </div>
        ${addPublisherModalHtml()}`;
      return;
    }

    if (pubFocusIndex >= sorted.length) pubFocusIndex = 0;
    const pub = sorted[pubFocusIndex];

    container.innerHTML = `
      <div class="pub-focus-wrap">
        <div class="pub-focus-nav">
          <button class="btn-focus-nav" onclick="focusPubNav(-1)"
            ${pubFocusIndex === 0 ? 'disabled' : ''}>← Prev</button>
          <span class="pub-focus-counter">${pubFocusIndex + 1} / ${sorted.length}</span>
          <button class="btn-focus-nav" onclick="focusPubNav(1)"
            ${pubFocusIndex === sorted.length - 1 ? 'disabled' : ''}>Next →</button>
          <button class="${focusBtnClass}" onclick="togglePubFocus()">Exit Focus Mode</button>
        </div>
        <div class="pub-focus-card">${pubCardHtml(pub)}</div>
      </div>
      ${addPublisherModalHtml()}`;
  }

  function pubCardHtml(pub) {
    const contactDone = !!pub.contact_email;
    const sentDone    = !!pub.outreach_date;
    const replyDone   = !!pub.response_date || ['IN_DISCUSSION','LICENSED','DECLINED'].includes(pub.status);

    const check = (done, label) =>
      `<span class="pub-check-item ${done ? 'done' : ''}">${done ? '✓' : '○'} ${label}</span>`;

    const statusBadgeClass = {
      OUTREACH_PENDING: 'badge-amber',
      IN_DISCUSSION:    'badge-blue',
      LICENSED:         'badge-green',
      DECLINED:         'badge-red',
      EXPIRED:          'badge-muted',
    }[pub.status] || 'badge-muted';

    const statusLabel = pub.status.replace(/_/g, ' ');

    let contactHtml = '';
    if (pub.contact_name || pub.contact_email) {
      contactHtml = `<div class="pub-contact">
        ${pub.contact_name ? `<span class="pub-contact-name">${esc(pub.contact_name)}</span>` : ''}
        ${pub.contact_name && pub.contact_email ? ' · ' : ''}
        ${pub.contact_email ? `<a class="pub-contact-email" href="mailto:${esc(pub.contact_email)}">${esc(pub.contact_email)}</a>` : ''}
      </div>`;
    }

    let datesHtml = '';
    const dateParts = [];
    if (pub.outreach_date)  dateParts.push(`<span class="pub-date">Sent ${fmtDate(pub.outreach_date)}</span>`);
    if (pub.response_date)  dateParts.push(`<span class="pub-date">Replied ${fmtDate(pub.response_date)}</span>`);
    if (pub.license_expiry) {
      const warn = new Date(pub.license_expiry) < new Date();
      dateParts.push(`<span class="pub-date ${warn ? 'pub-date-warn' : ''}">Expires ${fmtDate(pub.license_expiry)}</span>`);
    }
    if (dateParts.length) datesHtml = `<div class="pub-dates">${dateParts.join('')}</div>`;

    const portalHtml = pub.asset_portal_url
      ? `<div class="pub-portal"><a class="pub-portal-link" href="${esc(pub.asset_portal_url)}" target="_blank">↗ Asset Portal</a></div>`
      : '';

    // Inline contact form (hidden by default, shown when "Add contact email" clicked)
    const inlineFormHtml = `
      <div id="contact-form-${pub.id}" class="pub-inline-form" style="display:none;">
        <input class="field" type="text"  id="cname-${pub.id}"  placeholder="Contact name (optional)">
        <input class="field" type="email" id="cemail-${pub.id}" placeholder="contact@publisher.com *">
        <div class="pub-inline-actions">
          <button class="btn-save-contact" onclick="saveContact('${pub.id}')">Save</button>
          <button class="btn-cancel-inline" onclick="document.getElementById('contact-form-${pub.id}').style.display='none'">Cancel</button>
        </div>
      </div>`;

    return `
      <div class="pub-card" id="pub-card-${pub.id}">
        <div class="pub-card-header">
          <div>
            <div class="pub-name">${esc(pub.publisher_name)}</div>
            <div class="pub-domain">${esc(pub.publisher_domain || '')}</div>
          </div>
          <span class="pub-badge ${statusBadgeClass}">${statusLabel}</span>
        </div>
        <div class="pub-checklist">
          ${check(contactDone, 'Found contact')}
          ${check(sentDone,    'Sent email')}
          ${check(replyDone,   'Got reply')}
        </div>
        ${contactHtml}
        ${inlineFormHtml}
        ${datesHtml}
        ${portalHtml}
        <div class="pub-actions">${pubNextActionHtml(pub)}</div>
        <div id="pub-status-${pub.id}" class="pub-action-status"></div>
      </div>`;
  }

  function pubNextActionHtml(pub) {
    const id = pub.id;
    switch (pub.status) {
      case 'OUTREACH_PENDING':
        if (!pub.contact_email) {
          return `<button class="btn-pub-action btn-pub-amber" onclick="showContactForm('${id}')">Add contact email</button>`;
        }
        return `<button class="btn-pub-action btn-pub-amber" onclick="pubMarkSent('${id}')">Mark Sent</button>
                <button class="btn-pub-action btn-pub-muted"  onclick="showContactForm('${id}')">Edit contact</button>`;
      case 'IN_DISCUSSION':
        return `<button class="btn-pub-action btn-pub-green" onclick="pubUpdateStatus('${id}','LICENSED')">Mark Licensed</button>
                <button class="btn-pub-action btn-pub-red"   onclick="pubUpdateStatus('${id}','DECLINED')">Mark Declined</button>`;
      case 'LICENSED':
        return `<span class="pub-action-done">✓ Licensed</span>`;
      case 'DECLINED':
        return `<button class="btn-pub-action btn-pub-muted" onclick="pubUpdateStatus('${id}','OUTREACH_PENDING')">Re-open</button>`;
      case 'EXPIRED':
        return `<button class="btn-pub-action btn-pub-amber" onclick="pubUpdateStatus('${id}','IN_DISCUSSION')">Mark Renewed</button>`;
      default:
        return '';
    }
  }

  function addPublisherModalHtml() {
    return `
      <div id="add-pub-modal" class="pub-modal" style="display:none;" onclick="closePubModalOnBackdrop(event)">
        <div class="pub-modal-box">
          <h3>Add Publisher</h3>
          <div class="field-group">
            <label>Publisher name *</label>
            <input class="field" id="new-pub-name"   type="text"  placeholder="Tor Books">
          </div>
          <div class="field-group">
            <label>Domain *</label>
            <input class="field" id="new-pub-domain" type="text"  placeholder="tor.com">
          </div>
          <div class="field-group">
            <label>Contact name</label>
            <input class="field" id="new-pub-cname"  type="text"  placeholder="Jane Smith">
          </div>
          <div class="field-group">
            <label>Contact email</label>
            <input class="field" id="new-pub-cemail" type="email" placeholder="permissions@tor.com">
          </div>
          <div class="pub-modal-actions">
            <button class="btn-pub-action btn-pub-indigo" onclick="saveNewPublisher()">Add Publisher</button>
            <button class="btn-cancel-inline" onclick="closeAddPublisher()">Cancel</button>
          </div>
          <div id="add-pub-error" style="color:var(--red);font-size:13px;"></div>
        </div>
      </div>`;
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function togglePubFocus() {
    pubFocusMode  = !pubFocusMode;
    pubFocusIndex = 0;
    renderPublishers();
  }

  function focusPubNav(dir) {
    const sorted = sortedPubs();
    pubFocusIndex = Math.max(0, Math.min(sorted.length - 1, pubFocusIndex + dir));
    renderPublishers();
  }

  function showContactForm(id) {
    document.getElementById(`contact-form-${id}`).style.display = 'flex';
    document.getElementById(`contact-form-${id}`).style.flexDirection = 'column';
  }

  async function saveContact(id) {
    const name  = document.getElementById(`cname-${id}`).value.trim();
    const email = document.getElementById(`cemail-${id}`).value.trim();
    if (!email) { alert('Contact email is required.'); return; }

    const { error } = await db.from('publisher_licenses')
      .update({ contact_name: name || null, contact_email: email })
      .eq('id', id);

    if (error) { alert(`Save failed: ${error.message}`); return; }

    const rec = pubRecords.find(p => p.id === id);
    if (rec) { rec.contact_name = name || null; rec.contact_email = email; }
    renderPublishers();
  }

  async function pubMarkSent(id) {
    const now = new Date().toISOString();
    const { error } = await db.from('publisher_licenses')
      .update({ outreach_date: now, status: 'IN_DISCUSSION' })
      .eq('id', id);

    if (error) { alert(`Failed: ${error.message}`); return; }

    const rec = pubRecords.find(p => p.id === id);
    if (rec) { rec.outreach_date = now; rec.status = 'IN_DISCUSSION'; }
    renderPublishers();
  }

  async function pubUpdateStatus(id, status) {
    const updates = { status };
    if (['IN_DISCUSSION','LICENSED','DECLINED'].includes(status)) {
      updates.response_date = new Date().toISOString();
    }

    const { error } = await db.from('publisher_licenses').update(updates).eq('id', id);
    if (error) { alert(`Failed: ${error.message}`); return; }

    const rec = pubRecords.find(p => p.id === id);
    if (rec) { Object.assign(rec, updates); }
    renderPublishers();
  }

  function openAddPublisher() {
    document.getElementById('add-pub-modal').style.display = 'flex';
  }

  function closeAddPublisher() {
    document.getElementById('add-pub-modal').style.display = 'none';
  }

  function closePubModalOnBackdrop(event) {
    if (event.target === document.getElementById('add-pub-modal')) closeAddPublisher();
  }

  async function saveNewPublisher() {
    const name   = document.getElementById('new-pub-name').value.trim();
    const domain = document.getElementById('new-pub-domain').value.trim();
    const cname  = document.getElementById('new-pub-cname').value.trim();
    const cemail = document.getElementById('new-pub-cemail').value.trim();
    const errEl  = document.getElementById('add-pub-error');
    errEl.textContent = '';

    if (!name || !domain) {
      errEl.textContent = 'Publisher name and domain are required.';
      return;
    }

    const { data, error } = await db.from('publisher_licenses').insert({
      publisher_name:            name,
      publisher_domain:          domain,
      contact_name:              cname  || null,
      contact_email:             cemail || null,
      status:                    'OUTREACH_PENDING',
      contact_discovery_method:  'MANUAL',
    }).select().single();

    if (error) { errEl.textContent = `Failed: ${error.message}`; return; }

    pubRecords.push(data);
    closeAddPublisher();
    renderPublishers();
  }
</script>
</body>
</html>
